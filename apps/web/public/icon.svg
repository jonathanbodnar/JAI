<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="JAI">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%"  stop-color="#1c1838"/>
      <stop offset="55%" stop-color="#0b0b0c"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="orb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#9d7bff"/>
      <stop offset="100%" stop-color="#5b3bff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- maskable safe zone: 80% of canvas; keep all content within 410x410 center -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- subtle orbital ring -->
  <circle cx="256" cy="256" r="178" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
  <circle cx="256" cy="256" r="148" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2"/>

  <!-- accent orb -->
  <circle cx="356" cy="156" r="22" fill="url(#orb)" filter="url(#glow)"/>

  <!-- wordmark: lowercase "jai" -->
  <text
    x="256" y="312"
    text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="220"
    letter-spacing="-12"
    fill="#ffffff"
  >jai</text>
</svg>
