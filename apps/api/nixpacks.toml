# Nixpacks builder config (Railway uses this if present).
[phases.setup]
nixPkgs = ["python312", "uv", "gcc", "openssl", "libffi"]

[phases.install]
cmds = ["uv sync --frozen --no-dev"]

[phases.build]
cmds = ["echo 'no build step'"]

[start]
cmd = "uv run uvicorn jai_api.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
