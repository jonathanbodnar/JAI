# Railway config for the Python backend.
# Use this OR fly.toml — not both.
#
# Setup:
#   1) railway init
#   2) railway link <project>
#   3) railway up   (or connect GitHub repo with Root Directory = apps/api)

[build]
builder = "NIXPACKS"
buildCommand = "uv sync --frozen --no-dev"

[deploy]
startCommand = "uv run uvicorn jai_api.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "jai-api"
