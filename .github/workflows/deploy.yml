name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API → Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - working-directory: apps/api
        run: flyctl deploy --remote-only --app jai-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  tts:
    name: TTS → Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - working-directory: apps/tts
        run: flyctl deploy --remote-only --app jai-tts
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  sandbox:
    name: Sandbox → Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - working-directory: infra/cloudflare/sandbox
        run: |
          npm install
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  pwa:
    name: PWA → Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [api]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v6
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @jai/web build
        env:
          NEXT_PUBLIC_JAI_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_JAI_BACKEND_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/.next --project-name=jai-pwa
